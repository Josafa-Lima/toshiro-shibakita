Load Balancer NGINX - distribui requisicoes entre containers PHP
Os IPs abaixo devem ser substituidos pelos IPs privados das EC2 na AWS

http {
    upstream all {
        server 172.31.0.37:80;
        server 172.31.0.151:80;
        server 172.31.0.149:80;
    }

    server {
        listen 4500;
        location / {
            proxy_pass http://all/;
        }
    }
}

events { }
